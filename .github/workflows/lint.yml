name: Lint & Format

on:
  push:
    paths:
      - "**.py"
      - "pyproject.toml"
      - ".pre-commit-config.yaml"
  pull_request:
    paths:
      - "**.py"
      - "pyproject.toml"
      - ".pre-commit-config.yaml"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tools
        run: pip install black ruff

      - name: black (check mode)
        run: black --check .

      - name: ruff
        run: ruff check .
